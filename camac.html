<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Ruido Fantasma</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
</head>

<body>
<script>

let video;
let handpose;
let predictions = [];

let osc;
let filter;

let noiseLevel = 0;
let freq = 220;

function setup() {
  createCanvas(640, 480);

  video = createCapture(VIDEO);
  video.size(width, height);
  video.hide();

  handpose = ml5.handpose(video, () => {
    console.log("modelo listo");
  });

  handpose.on("predict", results => {
    predictions = results;
  });

  osc = new p5.Oscillator("sawtooth");
  osc.start();
  osc.amp(0.2);

  filter = new p5.LowPass();
  osc.disconnect();
  osc.connect(filter);
}

function draw() {
  background(0);

  image(video, 0, 0);

  let hands = predictions;

  if (hands.length >= 2) {

    let handA = hands[0].landmarks;
    let handB = hands[1].landmarks;

    // pulgar de cada mano como referencia
    let x1 = handA[8][0];
    let y1 = handA[8][1];

    let x2 = handB[8][0];
    let y2 = handB[8][1];

    // distancia entre manos = caos
    let d = dist(x1, y1, x2, y2);

    noiseLevel = map(d, 0, width, 2000, 100);
    freq = map(y1, 0, height, 80, 800);

    // glitch mode si están muy cerca
    if (d < 80) {
      freq *= random(0.5, 2);
      noiseLevel = 2000;
    }

    osc.freq(freq);
    filter.freq(noiseLevel);

    // dibujito energético
    stroke(0, 255, 180);
    line(x1, y1, x2, y2);
    noStroke();
    fill(255);
    ellipse(x1, y1, 10);
    ellipse(x2, y2, 10);

  } else if (hands.length == 1) {
    let hand = hands[0].landmarks;

    let x = hand[8][0];
    let y = hand[8][1];

    freq = map(y, 0, height, 100, 1000);
    osc.freq(freq);

    filter.freq(1000);

    fill(255, 100);
    ellipse(x, y, 20);
  }

  fill(255);
  text("RUÍDO FANTASMA V0.1", 10, 20);
}

</script>
</body>
</html>
