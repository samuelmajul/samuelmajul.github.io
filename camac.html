<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CAMERA / SIGNAL SYSTEM</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: monospace;
}

canvas { display:block; }

#ui {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 10;
  color: white;
  background: rgba(0,0,0,0.4);
  padding: 10px;
  border: 1px solid #222;
}

label { display:block; margin:6px 0; }
</style>
</head>

<body>

<div id="ui">
  <label>signal distortion
    <input id="dist" type="range" min="0" max="1" step="0.01" value="0.2">
  </label>

  <label>scan intensity
    <input id="scan" type="range" min="0" max="1" step="0.01" value="0.3">
  </label>

  <label>color drift
    <input id="color" type="range" min="0" max="2" step="0.01" value="1">
  </label>

  <label>breathing
    <input id="pulse" type="range" min="0" max="1" step="0.01" value="0.5">
  </label>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="c"></canvas>

<script>
const video = document.getElementById("video");
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = 640;
c.height = 480;

// camera
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// UI
const dist = document.getElementById("dist");
const scan = document.getElementById("scan");
const color = document.getElementById("color");
const pulse = document.getElementById("pulse");

// buffer canvas (clave para performance)
const buffer = document.createElement("canvas");
const bctx = buffer.getContext("2d");
buffer.width = c.width;
buffer.height = c.height;

let t = 0;

function loop() {
  requestAnimationFrame(loop);
  t += 0.01;

  const d = +dist.value;
  const s = +scan.value;
  const col = +color.value;
  const p = +pulse.value;

  // “auto exposure vibe”
  bctx.drawImage(video, 0, 0, c.width, c.height);

  let frame = bctx.getImageData(0, 0, c.width, c.height);
  let data = frame.data;

  ctx.clearRect(0,0,c.width,c.height);

  let pulseWave = 1 + Math.sin(t * 3) * p * 0.3;

  for (let y = 0; y < c.height; y += 3) {

    // scanlines
    let scanBoost = Math.sin(y * 0.1 + t * 10) * s * 10;

    for (let x = 0; x < c.width; x += 3) {

      let i = (y * c.width + x) * 4;

      let r = data[i];
      let g = data[i+1];
      let b = data[i+2];

      // color drift orgánico
      let drift = Math.sin((x + y) * 0.01 + t);

      r *= col + drift * 0.2;
      g *= col + Math.sin(t + x * 0.01) * 0.2;
      b *= col + Math.cos(t + y * 0.01) * 0.2;

      // glitch por bandas
      let glitchX = Math.sin(y * 0.05 + t * 5) * d * 20;

      let size = 3 * pulseWave;

      ctx.fillStyle = `rgb(${r},${g},${b})`;

      ctx.fillRect(
        x + glitchX,
        y + scanBoost,
        size,
        size
      );
    }
  }

  // scan overlay
  if (s > 0) {
    ctx.fillStyle = `rgba(0,0,0,${0.05 * s})`;
    for (let i = 0; i < c.height; i += 2) {
      ctx.fillRect(0, i, c.width, 1);
    }
  }
}

loop();
</script>

</body>
</html>
