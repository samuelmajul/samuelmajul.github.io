<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ASCII CAM</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
  }

  video {
    display: none;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 260px;
    padding: 10px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #0f0;
    color: #0f0;
  }

  textarea, input {
    width: 100%;
    background: black;
    color: #0f0;
    border: 1px solid #0f0;
    font-family: monospace;
  }

  label {
    font-size: 12px;
  }
</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <label>ASCII chars</label>
  <textarea id="chars"> .:-=+*#%@</textarea>

  <label>Resolución</label>
  <input id="res" type="range" min="4" max="24" value="10">

  <label>Contraste</label>
  <input id="contrast" type="range" min="1" max="10" value="4">

  <label>Brillo</label>
  <input id="bright" type="range" min="0" max="255" value="100">

  <label>Invertir</label>
  <input id="invert" type="checkbox">
</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let vw = 320;
let vh = 240;

let off = document.createElement("canvas");
let offCtx = off.getContext("2d");

off.width = vw;
off.height = vh;

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  alert("no camera access");
});

function draw() {

  let chars = document.getElementById("chars").value;
  let res = parseInt(document.getElementById("res").value);
  let contrast = parseFloat(document.getElementById("contrast").value);
  let bright = parseInt(document.getElementById("bright").value);
  let invert = document.getElementById("invert").checked;

  offCtx.drawImage(video, 0, 0, vw, vh);

  let img = offCtx.getImageData(0, 0, vw, vh);
  let data = img.data;

  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = (res) + "px monospace";
  ctx.fillStyle = "#00ff66";

  let stepX = canvas.width / vw;
  let stepY = canvas.height / vh;

  for (let y = 0; y < vh; y += 2) {
    for (let x = 0; x < vw; x += 2) {

      let i = (x + y * vw) * 4;

      let r = data[i];
      let g = data[i + 1];
      let b = data[i + 2];

      let avg = (r + g + b) / 3;

      avg = (avg - bright) * contrast;
      avg = Math.max(0, Math.min(255, avg));

      let index = Math.floor((avg / 255) * (chars.length - 1));

      if (invert) index = chars.length - 1 - index;

      let c = chars.charAt(index);

      ctx.fillText(c, x * stepX, y * stepY);
    }
  }

  requestAnimationFrame(draw);
}

video.addEventListener("loadeddata", draw);

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
