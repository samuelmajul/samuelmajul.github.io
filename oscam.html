<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ASCII CAM</title>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
    color: #0f0;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 260px;
    padding: 10px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #0f0;
    backdrop-filter: blur(5px);
  }

  input, textarea {
    width: 100%;
    background: black;
    color: #0f0;
    border: 1px solid #0f0;
    font-family: monospace;
  }

  label {
    font-size: 12px;
  }

</style>
</head>

<body>

<div id="ui">
  <label>Caracteres ASCII</label>
  <textarea id="chars"> .:-=+*#%@</textarea>

  <label>Resolución</label>
  <input type="range" id="res" min="4" max="20" value="8">

  <label>Contraste</label>
  <input type="range" id="contrast" min="1" max="10" value="5">

  <label>Brillo</label>
  <input type="range" id="bright" min="0" max="255" value="120">

  <label>Invertir</label>
  <input type="checkbox" id="invert">

</div>

<script>

let cam;
let videoScale = 8;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);

  cam = createCapture(VIDEO);
  cam.size(320, 240);
  cam.hide();

  textFont('monospace');
  textSize(10);
}

function draw() {
  background(0);

  let chars = document.getElementById("chars").value;
  let res = parseInt(document.getElementById("res").value);
  let contrast = parseFloat(document.getElementById("contrast").value);
  let bright = parseInt(document.getElementById("bright").value);
  let invert = document.getElementById("invert").checked;

  let w = cam.width;
  let h = cam.height;

  cam.loadPixels();

  let cellW = width / w * res;
  let cellH = height / h * res;

  for (let y = 0; y < h; y += 2) {
    for (let x = 0; x < w; x += 2) {

      let i = (x + y * w) * 4;

      let r = cam.pixels[i];
      let g = cam.pixels[i + 1];
      let b = cam.pixels[i + 2];

      // luminancia
      let avg = (r + g + b) / 3;

      avg = (avg - bright) * contrast;
      avg = constrain(avg, 0, 255);

      let index = floor(map(avg, 0, 255, 0, chars.length - 1));

      if (invert) index = (chars.length - 1) - index;

      let c = chars.charAt(index);

      fill(0, 255, 100);
      text(c, x * cellW, y * cellH);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

</script>

</body>
</html>
