body {

a {

.footer-links {

#bgcam {
    position: fixed;
    top: 0;
    left: 0;

    height: 100%;
    object-fit: cover;
    z-index: -2;
    display: none;
}

#glitch {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    mix-blend-mode: screen;
    pointer-events: none;
}

#sensorBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    background: #1a1a1a;
    color: #d1d1d1;

    padding: 6px 10px;

    font-size: 10px;
    cursor: pointer;
    display: none;
}
#sensorBtn:hover {
    border-color: #d1d1d1;
}

/* PANEL CTRL NET.ART 2000 */
#ctrlPanel {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    font-family: "Courier New", monospace;
    font-size: 10px;
    color: #d1d1d1;
    background: #1a1a1a;
    border: 1px dashed #444444;
    width: 200px;
}

#ctrlHeader {
    background: #121212;
    padding: 4px 6px;
    cursor: pointer;
    border-bottom: 1px dashed #444444;
    user-select: none;
    color: #ffffff;
}

#ctrlHeader:hover {
    background: #222;
}

#ctrlBody {
    padding: 6px;
    display: none;
    max-height: 70vh;
    overflow-y: auto;
}

#ctrlPanel.open #ctrlBody {
    display: block;
}

.ctrl-row {
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px dotted #333;
}
.ctrl-row:last-of-type {
    border-bottom: none;
}

.ctrl-row label {
    display: block;
    margin-bottom: 3px;
    color: #d1d1d1;
}

.ctrl-row input[type="range"] {
    width: 100%;
    height: 10px;
    background: #121212;
    border: 1px solid #444;
    outline: none;
    -webkit-appearance: none;
    cursor: pointer;
}

.ctrl-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 8px;
    height: 10px;
    background: #d1d1d1;
    cursor: pointer;
}

.ctrl-row input[type="range"]::-moz-range-thumb {
    width: 8px;
    height: 10px;
    background: #d1d1d1;
    cursor: pointer;
    border: none;
}

.ctrl-val {
    color: #00ffff;
    float: right;
}

.ctrl-btn {
    width: 100%;
    background: transparent;
    border: none;
    color: #d1d1d1;
    padding: 3px 0;
    font-family: "Courier New", monospace;
    font-size: 10px;
    cursor: pointer;
    text-align: left;
    margin-top: 2px;
}

.ctrl-btn:hover {
    color: #00ffff;
    text-decoration: underline;
}

.ctrl-btn:before {
    content: "[ ";
}
.ctrl-btn:after {
    content: " ]";
}

/* Scrollbar dosmilero */
#ctrlBody::-webkit-scrollbar {
    width: 8px;
}
#ctrlBody::-webkit-scrollbar-track {
    background: #121212;
    border-left: 1px solid #444;
}
#ctrlBody::-webkit-scrollbar-thumb {
    background: #444;
}

<script>
// Todo el JS del glitch queda igual que la versión anterior
const video = document.getElementById("bgcam");
const canvas = document.getElementById("glitch");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const sensorBtn = document.getElementById("sensorBtn");

const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
const SCALE = isMobile? 0.75 : 1;

let params = {
    gap: isMobile? 8 : 12,
    tearChance: 0.7,
    rgbShift: 3,
    minBright: 35,
    opacity: 0.4,
    colorR: 0,
    colorG: 255,
    colorB: 70
};

let mouse = { x: undefined, y: undefined, radius: 150 };
let gravity = { x: 0, y: 0, intensity: 0 };
let targetGravity = { x: 0, y: 0 };
let time = 0;

const ctrlPanel = document.getElementById("ctrlPanel");
const ctrlHeader = document.getElementById("ctrlHeader");

ctrlHeader.addEventListener('click', () => {
    ctrlPanel.classList.toggle('open');
    ctrlHeader.textContent = ctrlPanel.classList.contains('open')? '// CTRL' : '// CTRL';
});

document.getElementById('gapSlider').addEventListener('input', (e) => {
    params.gap = parseInt(e.target.value);
    document.getElementById('valGap').textContent = params.gap;
});

document.getElementById('tearSlider').addEventListener('input', (e) => {
    params.tearChance = e.target.value / 100;
    document.getElementById('valTear').textContent = e.target.value;
});

document.getElementById('shiftSlider').addEventListener('input', (e) => {
    params.rgbShift = parseInt(e.target.value);
    document.getElementById('valShift').textContent = params.rgbShift;
});

document.getElementById('brightSlider').addEventListener('input', (e) => {
    params.minBright = parseInt(e.target.value);
    document.getElementById('valBright').textContent = params.minBright;
});

document.getElementById('opacitySlider').addEventListener('input', (e) => {
    params.opacity = e.target.value / 100;
    canvas.style.opacity = params.opacity;
    document.getElementById('valOpacity').textContent = e.target.value;
});

document.getElementById('rSlider').addEventListener('input', (e) => {
    params.colorR = parseInt(e.target.value);
    document.getElementById('valR').textContent = params.colorR;
});

document.getElementById('gSlider').addEventListener('input', (e) => {
    params.colorG = parseInt(e.target.value);
    document.getElementById('valG').textContent = params.colorG;
});

document.getElementById('bSlider').addEventListener('input', (e) => {
    params.colorB = parseInt(e.target.value);
    document.getElementById('valB').textContent = params.colorB;
});

document.getElementById('resetBtn').addEventListener('click', () => {
    params = {
        gap: isMobile? 8 : 12,
        tearChance: 0.7,
        rgbShift: 3,
        minBright: 35,
        opacity: 0.4,
        colorR: 0,
        colorG: 255,
        colorB: 70
    };
    document.getElementById('gapSlider').value = params.gap;
    document.getElementById('tearSlider').value = params.tearChance * 100;
    document.getElementById('shiftSlider').value = params.rgbShift;
    document.getElementById('brightSlider').value = params.minBright;
    document.getElementById('opacitySlider').value = params.opacity * 100;
    document.getElementById('rSlider').value = params.colorR;
    document.getElementById('gSlider').value = params.colorG;
    document.getElementById('bSlider').value = params.colorB;
    document.getElementById('valGap').textContent = params.gap;
    document.getElementById('valTear').textContent = params.tearChance * 100;
    document.getElementById('valShift').textContent = params.rgbShift;
    document.getElementById('valBright').textContent = params.minBright;
    document.getElementById('valOpacity').textContent = params.opacity * 100;
    document.getElementById('valR').textContent = params.colorR;
    document.getElementById('valG').textContent = params.colorG;
    document.getElementById('valB').textContent = params.colorB;
    canvas.style.opacity = params.opacity;
});

document.getElementById('hideBtn').addEventListener('click', () => {
    ctrlPanel.style.display = 'none';
});

window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener('mouseleave', () => {
    mouse.x = undefined;
    mouse.y = undefined;
});

window.addEventListener('touchmove', (e) => {
    if(e.touches[0]) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
    }
});

function initSensors() {
    if (typeof DeviceOrientationEvent!== 'undefined') {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        sensorBtn.style.display = 'none';
                    }
                }).catch(console.error);
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
            sensorBtn.style.display = 'none';
        }
    }
}

if (isMobile && typeof DeviceOrientationEvent.requestPermission === 'function') {
    sensorBtn.style.display = 'block';
    sensorBtn.addEventListener('click', initSensors);
} else {
    initSensors();
}

function handleOrientation(event) {
    let x = event.gamma || 0;
    let y = event.beta || 0;
    targetGravity.x = (x / 45) * (isMobile? 3 : 1);
    targetGravity.y = ((y - 45) / 45) * (isMobile? 3 : 1);
}

function resizeCanvas() {
    canvas.width = window.innerWidth * SCALE;
    canvas.height = window.innerHeight * SCALE;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
canvas.style.opacity = params.opacity;

navigator.mediaDevices.getUserMedia({
    video: {
        facingMode: 'user',
        width: { ideal: 640 },
        height: { ideal: 480 }
    }
})
.then(stream => {
    video.srcObject = stream;
    video.play().catch(e => {});
})
.catch(err => { console.log("Cámara no disponible", err); });

const chars = "01_/*X#+=-█░▒▓▋■▌▐▀▄";

function drawCoverVideo() {
    const videoRatio = video.videoWidth / video.videoHeight;
    const canvasRatio = canvas.width / canvas.height;
    let drawWidth, drawHeight, offsetX = 0, offsetY = 0;

    if (canvasRatio > videoRatio) {
        drawWidth = canvas.width;
        drawHeight = canvas.width / videoRatio;
        offsetY = (canvas.height - drawHeight) / 2;
    } else {
        drawHeight = canvas.height;
        drawWidth = canvas.height * videoRatio;
        offsetX = (canvas.width - drawWidth) / 2;
    }

    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -drawWidth - offsetX, offsetY, drawWidth, drawHeight);
    ctx.restore();
}

function glitch() {
    time += 0.016;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        gravity.x += (targetGravity.x - gravity.x) * 0.1;
        gravity.y += (targetGravity.y - gravity.y) * 0.1;
        gravity.intensity = Math.sqrt(gravity.x * gravity.x + gravity.y * gravity.y);

        drawCoverVideo();

        try {
            let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = frame.data;

            ctx.fillStyle = "#121212";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = `bold ${isMobile? 8 : 10}px monospace`;

            for (let y = 0; y < canvas.height; y += params.gap) {
                for (let x = 0; x < canvas.width; x += params.gap) {
                    let index = (x + y * canvas.width) * 4;
                    let r = data[index];
                    let g = data[index + 1];
                    let b = data[index + 2];

                    let brightness = (r * 0.299 + g * 0.587 + b * 0.114);

                    let gravityOffsetX = Math.sin(y * 0.05 + time) * (gravity.x * 35);
                    let gravityOffsetY = Math.cos(x * 0.05 + time) * (gravity.y * 35);

                    let dx = mouse.x * SCALE - x;
                    let dy = mouse.y * SCALE - y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let mouseOffsetX = 0;

                    if (distance < mouse.radius * SCALE && mouse.x!== undefined) {
                        let mouseFactor = (mouse.radius * SCALE - distance) / (mouse.radius * SCALE);
                        mouseOffsetX = Math.sin(y * 0.1 + time * 2) * (30 * mouseFactor);
                        brightness = Math.min(255, brightness * (1 + mouseFactor * 1.5));
                    }

                    let finalX = x + gravityOffsetX + mouseOffsetX;
                    let finalY = y + gravityOffsetY;

                    if (brightness > params.minBright) {
                        let charIndex = Math.floor((brightness / 255) * chars.length);

                        if (gravity.intensity > 0.3 && Math.random() > 0.3) {
                            charIndex = Math.floor(Math.random() * chars.length);
                            finalX += (Math.random() - 0.5) * 10 * gravity.intensity;
                        }

                        let char = chars[charIndex] || " ";

                        if (gravity.intensity > 0.2 && params.rgbShift > 0) {
                            let shift = gravity.intensity * params.rgbShift;
                            ctx.fillStyle = `rgba(255, ${brightness}, ${120 + brightness}, 0.9)`;
                            ctx.fillText(char, finalX - shift, finalY);
                            ctx.fillStyle = `rgba(0, 255, ${brightness}, 0.9)`;
                            ctx.fillText(char, finalX + shift, finalY);
                            ctx.fillStyle = `rgba(${brightness}, 200, 255, 0.9)`;
                            ctx.fillText(char, finalX, finalY);
                        } else if (distance < mouse.radius * SCALE && mouse.x!== undefined) {
                            ctx.fillStyle = `rgba(0, 255, 200, ${brightness / 255})`;
                            ctx.fillText(char, finalX, finalY);
                        } else {
                            ctx.fillStyle = `rgba(${params.colorR}, ${params.colorG}, ${params.colorB}, 0.9)`;
                            ctx.fillText(char, finalX, finalY);
                        }
                    }
                }
            }

            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            for(let i = 0; i < canvas.height; i += 3) {
                ctx.fillRect(0, i, canvas.width, 1);
            }

            if (Math.random() > params.tearChance) {
                let sliceY = Math.random() * canvas.height;
                let sliceH = Math.random() * 150 + 20;
                let displacement = (Math.random() * 120 - 60) * (1 + gravity.intensity * 2);
                ctx.drawImage(canvas, 0, sliceY, canvas.width, sliceH, displacement, sliceY, canvas.width, sliceH);
            }

        } catch (e) { console.error(e); }
    }
    requestAnimationFrame(glitch);
}

requestAnimationFrame(glitch);
</script>
</body>
