<!-- SCRIPT GENERATIVO INTERACTIVO HÍBRIDO -->
<script>
const video = document.getElementById("bgcam");
const canvas = document.getElementById("glitch");
const ctx = canvas.getContext("2d");

// Control de interacciones físicas
let mouse = { x: undefined, y: undefined, radius: 150 };
let gravity = { x: 0, y: 0, intensity: 0 }; 
let targetGravity = { x: 0, y: 0 };

// 1. Detección de Mouse (Escritorio)
window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener('mouseleave', () => { 
    mouse.x = undefined; 
    mouse.y = undefined; 
});

// 2. Detección de Sensores de Gravedad (Celular)
function initSensors() {
    if (typeof DeviceOrientationEvent !== 'undefined') {
        // Validación de permisos requerida para dispositivos con iOS 13+
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                })
                .catch(console.error);
        } else {
            // Android y navegadores móviles estándar
            window.addEventListener('deviceorientation', handleOrientation);
        }
    }
}

function handleOrientation(event) {
    let x = event.gamma || 0; // Inclinación lateral
    let y = event.beta || 0;  // Inclinación frontal

    // Filtramos y adaptamos los valores a una escala de fuerza física
    targetGravity.x = x / 45; 
    targetGravity.y = (y - 45) / 45; // Compensación de ángulo de lectura cómodo
}

// Disparador de sensores mediante la primera interacción táctil obligatoria
window.addEventListener('click', initSensors, { once: true });
window.addEventListener('touchstart', initSensors, { once: true });

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Encendido seguro del flujo de cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => { video.srcObject = stream; video.play().catch(e => {}); })
.catch(err => { console.log("Cámara no disponible", err); });

// Set de glifos estilo terminal analógica DOS / Y2K
const chars = "01_/*X#+=-█░▒▓▋■";

function glitch() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        // Interpolación lineal matemática para suavizar el movimiento del acelerómetro
        gravity.x += (targetGravity.x - gravity.x) * 0.1;
        gravity.y += (targetGravity.y - gravity.y) * 0.1;
        gravity.intensity = Math.sqrt(gravity.x * gravity.x + gravity.y * gravity.y);

        // Renderizamos cámara espejada internamente para simular espejo real con el mouse
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        ctx.restore();

        try {
            let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = frame.data;
            
            // Reestablecemos el fondo oscuro en cada ciclo
            ctx.fillStyle = "#121212";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gap = 12; // Densidad del barrido tipográfico
            ctx.font = "bold 10px monospace";

            for (let y = 0; y < canvas.height; y += gap) {
                for (let x = 0; x < canvas.width; x += gap) {
                    let index = (x + y * canvas.width) * 4;
                    let r = data[index];
                    let g = data[index + 1];
                    let b = data[index + 2];
                    
                    let brightness = (r + g + b) / 3;

                    // Desplazamiento orgánico basado en la gravedad física del celular
                    let gravityOffsetX = Math.sin(y * 0.05 + Date.now() * 0.01) * (gravity.x * 25);
                    let gravityOffsetY = Math.cos(x * 0.05 + Date.now() * 0.01) * (gravity.y * 25);

                    // Deformación focal por proximidad del mouse
                    let dx = mouse.x - x;
                    let dy = mouse.y - y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let mouseOffsetX = 0;

                    if (distance < mouse.radius && mouse.x !== undefined) {
                        let mouseFactor = (mouse.radius - distance) / mouse.radius;
                        mouseOffsetX = Math.sin(y * 0.1 + Date.now() * 0.01) * (20 * mouseFactor);
                        brightness = Math.min(255, brightness * (1 + mouseFactor)); 
                    }

                    // Calculamos coordenadas de salida sumando las fuerzas físicas aplicadas
                    let finalX = x + gravityOffsetX + mouseOffsetX;
                    let finalY = y + gravityOffsetY;

                    if (brightness > 45) {
                        let charIndex = Math.floor((brightness / 255) * chars.length);
                        
                        // Si la agitación física supera el umbral, aleatorizamos los glifos
                        if (gravity.intensity > 0.5 && Math.random() > 0.4) {
                            charIndex = Math.floor(Math.random() * chars.length);
                        }
                        
                        let char = chars[charIndex] || " ";

                        // Dinámica de iluminación cromática interactiva
                        if (gravity.intensity > 0.3) {
                            // Al inclinar el celular muta a tonalidades magenta y cian ácidas
                            let rPulse = Math.floor(gravity.intensity * 80);
                            ctx.fillStyle = `rgba(${rPulse}, ${brightness}, ${120 + rPulse}, 0.9)`;
                        } else if (distance < mouse.radius && mouse.x !== undefined) {
                            ctx.fillStyle = `rgba(0, 255, 200, ${brightness / 255})`; // Foco cian eléctrico
                        } else {
                            ctx.fillStyle = `rgba(0, ${brightness}, 70, 0.9)`; // Verde fósforo crudo
                        }

                        ctx.fillText(char, finalX, finalY);
                    }
                }
            }

            // Módulo de desgarro de pantalla (Datamoshing por deformación física)
            let tearChance = 0.85 - (gravity.intensity * 0.2); 
            if (Math.random() > Math.max(0.5, tearChance)) {
                let sliceY = Math.random() * canvas.height;
                let sliceH = Math.random() * 120 + 20;
                let displacement = (Math.random() * 80 - 40) * (1 + gravity.intensity);
                ctx.drawImage(canvas, 0, sliceY, canvas.width, sliceH, displacement, sliceY, canvas.width, sliceH);
            }

        } catch (e) { console.error(e); }
    }
    requestAnimationFrame(glitch);
}

requestAnimationFrame(glitch);
</script>
