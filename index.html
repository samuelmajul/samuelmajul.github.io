<script>

const video = document.getElementById("bgcam");
const canvas = document.getElementById("glitch");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    console.log("sin cámara", err);
  });

function glitch() {
  try {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    let frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    let data = frame.data;

    for (let i = 0; i < data.length; i += 20) {
      data[i] += Math.random() * 40 - 20;
      data[i + 1] += Math.random() * 40 - 20;
      data[i + 2] += Math.random() * 40 - 20;
    }

    ctx.putImageData(frame, 0, 0);
  } catch (e) {}

  requestAnimationFrame(glitch);
}

video.addEventListener("loadeddata", glitch);

</script>
